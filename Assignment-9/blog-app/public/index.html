<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Blog | Modern & Fast</title>
  <meta name="description" content="A simple, fast, and modern cloud blog application.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-content">
        <h1>☁️ Cloud Blog</h1>
        <p>A fast, responsive, and elegant space for your thoughts.</p>
      </div>
    </header>

    <main class="main-content">
      <section class="compose-section">
        <div class="card compose-card">
          <h2>Create a Post</h2>
          <form id="post-form">
            <div class="input-group">
              <label for="title">Title</label>
              <input type="text" id="title" placeholder="Give your post a title..." required autocomplete="off">
            </div>
            <div class="input-group">
              <label for="content">Content</label>
              <textarea id="content" placeholder="What's on your mind?" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="submit-btn">
              <span>Publish Post</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </form>
        </div>
      </section>

      <section class="feed-section">
        <div class="feed-header">
          <h2>Recent Posts</h2>
          <span class="post-count" id="post-count">0 posts</span>
        </div>
        <div id="posts-container" class="posts-container">
          <!-- Posts will be injected here via JS -->
          <div class="loading-state">Loading posts...</div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
